version: '3.8'

services:
  cyber-printer:
    build: .
    container_name: cyber_printer_pro
    restart: always
    ports:
      - "8501:8501"
    volumes:
      # 核心数据挂载到宿主机，容器销毁不丢数据
      - ./novel_settings:/app/novel_settings
      - ./output:/app/output
      - ./logs:/app/logs
      - ./.env:/app/.env:ro  # 配置文件只读挂载，更安全
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    # 老iMac资源限制，避免卡死设备
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
    # 日志轮转，避免日志文件无限膨胀
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
