version: '3.8'
services:
  openmars:
    build: .
    container_name: openmars_pro
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - ./novel_settings:/app/novel_settings
      - ./output:/app/output
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
